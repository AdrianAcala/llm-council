services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - COUNCIL_MODELS=${COUNCIL_MODELS:-openai/gpt-5.1,google/gemini-3-pro-preview,anthropic/claude-sonnet-4.5}
      - CHAIRMAN_MODEL=${CHAIRMAN_MODEL:-google/gemini-3-pro-preview}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8001}
    depends_on:
      - backend
    restart: unless-stopped
